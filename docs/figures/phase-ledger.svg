      <text x="18" y="3" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">EACH GOLD DOT = ONE ADR (18 distinct phases · 24 ADRs)</text>
