  <rect width="1280" height="560" fill="url(#bg-pl)"/>

  <g transform="translate(40,36)">
    <text x="0" y="0" fill="#f8fafc" font-size="26" font-weight="800" letter-spacing="-0.3">Phase ledger · 0 → 45</text>
    <text x="0" y="22" fill="#cbd5e1" font-size="13">All 45 phases closed (✅). Phase 45 in flight (⏸ at Unit 45.0). 9 thematic clusters · 24 ADRs · 921/71 tests · 103 kB First Load JS UNCHANGED for 85 consecutive units.</text>
    <text x="1200" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 5 / 7</text>
    <text x="1200" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">HEAD a7e971b · 2026-05-18</text>
  </g>

