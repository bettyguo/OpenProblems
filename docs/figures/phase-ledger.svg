      <circle cx="508" cy="-12" r="3.5"/><!-- 0019 P19 -->
      <circle cx="743" cy="-12" r="3.5"/><!-- 0020 P28 -->
      <circle cx="795" cy="-12" r="3.5"/><!-- 0021 P30 -->
      <circle cx="821" cy="-12" r="3.5"/><!-- 0022 P31 -->
      <circle cx="873" cy="-12" r="3.5"/><!-- 0023 P33 -->
      <circle cx="925" cy="-12" r="3.5"/><!-- 0024 P35 -->
    </g>

