      <rect x="78"   y="0" width="104" height="50" fill="url(#band-intel)"/>
      <rect x="182"  y="0" width="52"  height="50" fill="url(#band-bilingual)"/>
      <rect x="234"  y="0" width="156" height="50" fill="url(#band-auth)"/>
