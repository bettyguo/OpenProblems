    <g fill="#fbbf24">
      <circle cx="13" cy="-12" r="3.5"/><!-- ADRs 0001-0005 at P0 (rendered as one dot) -->
      <circle cx="91" cy="-12" r="3.5"/><!-- 0006 P3 -->
      <circle cx="117" cy="-12" r="3.5"/><!-- 0007 P4 -->
      <circle cx="143" cy="-12" r="3.5"/><!-- 0008-0009 P5 -->
      <circle cx="169" cy="-12" r="3.5"/><!-- 0010 P6 -->
      <circle cx="196" cy="-12" r="3.5"/><!-- 0011 P7 -->
      <circle cx="248" cy="-12" r="3.5"/><!-- 0012-0013 P9 -->
      <circle cx="326" cy="-12" r="3.5"/><!-- 0014 P12 -->
      <circle cx="378" cy="-12" r="3.5"/><!-- 0015 P14 -->
      <circle cx="404" cy="-12" r="3.5"/><!-- 0016 P15 -->
      <circle cx="430" cy="-12" r="3.5"/><!-- 0017 P16 -->
