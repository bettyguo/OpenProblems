      <line x1="182"  y1="0" x2="182"  y2="50"/>
      <line x1="234"  y1="0" x2="234"  y2="50"/>
      <line x1="390"  y1="0" x2="390"  y2="50"/>
      <line x1="573"  y1="0" x2="573"  y2="50"/>
      <line x1="677"  y1="0" x2="677"  y2="50"/>
      <line x1="781"  y1="0" x2="781"  y2="50"/>
      <line x1="912"  y1="0" x2="912"  y2="50"/>
      <line x1="964"  y1="0" x2="964"  y2="50"/>
      <line x1="1173" y1="0" x2="1173" y2="50"/>
    </g>

    <!-- phase ticks across the bottom -->
    <g font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#cbd5e1">
      <text x="0"    y="70" text-anchor="middle">P0</text>
      <text x="130"  y="70" text-anchor="middle">P5</text>
      <text x="261"  y="70" text-anchor="middle">P10</text>
      <text x="391"  y="70" text-anchor="middle">P15</text>
      <text x="521"  y="70" text-anchor="middle">P20</text>
      <text x="652"  y="70" text-anchor="middle">P25</text>
      <text x="782"  y="70" text-anchor="middle">P30</text>
      <text x="913"  y="70" text-anchor="middle">P35</text>
      <text x="1043" y="70" text-anchor="middle">P40</text>
      <text x="1186" y="70" text-anchor="middle" fill="#fbbf24" font-weight="700">P45 ⏸</text>
