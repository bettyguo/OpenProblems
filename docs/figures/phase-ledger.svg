<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-label="Phase ledger — Phase 0 through Phase 44 closed, Phase 45 in flight; 45 phases / 24 ADRs / 921 of 71 tests / 103 kB First Load JS unchanged for 85 consecutive units" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Phase ledger 0 → 45</title>
  <defs>
    <linearGradient id="bg-pl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1437"/><stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="band-foundation" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="band-editorial" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#059669"/><stop offset="1" stop-color="#10b981"/></linearGradient>
    <linearGradient id="band-intel" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#a855f7"/></linearGradient>
    <linearGradient id="band-bilingual" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0ea5e9"/><stop offset="1" stop-color="#22d3ee"/></linearGradient>
    <linearGradient id="band-auth" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#f59e0b"/><stop offset="1" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="band-ops" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#dc2626"/><stop offset="1" stop-color="#f87171"/></linearGradient>
    <linearGradient id="band-email" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#9333ea"/><stop offset="1" stop-color="#c084fc"/></linearGradient>
    <linearGradient id="band-moderation" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#2dd4bf"/></linearGradient>
    <linearGradient id="band-markdown" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#be185d"/><stop offset="1" stop-color="#ec4899"/></linearGradient>
    <linearGradient id="band-pending" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#475569"/><stop offset="1" stop-color="#64748b"/></linearGradient>
  </defs>
  <rect width="1280" height="420" fill="url(#bg-pl)"/>

  <g transform="translate(40,36)">
    <text x="0" y="0" fill="#f8fafc" font-size="26" font-weight="800" letter-spacing="-0.3">Phase ledger · 0 → 45</text>
    <text x="0" y="22" fill="#cbd5e1" font-size="13">All 45 phases closed (✅). Phase 45 in flight (⏸ at unit 45.0). 9 thematic clusters · 24 ADRs · 921/71 tests · 103 kB First Load JS UNCHANGED for 85 consecutive units.</text>
    <text x="1240" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 5 / 7</text>
    <text x="1240" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">HEAD a7e971b · 2026-05-18</text>
  </g>

  <!-- Timeline track. 46 phases over a 1200-px ruler. -->
  <!-- Origin x=40, width=1200. Each phase = 1200/45 ≈ 26.67. We'll use 26 with 2 gap. -->
  <!-- Cluster bands: vertical stripes -->
  <g transform="translate(40,118)">
    <!-- cluster band background -->
    <g>
      <!-- Phase 0-2 = Foundation -->
      <rect x="0"   y="0" width="79"  height="40" fill="url(#band-foundation)"/>
      <!-- Phase 3-6 = Rating + Domain + Intel + Discussions -->
      <rect x="79"  y="0" width="106" height="40" fill="url(#band-intel)"/>
      <!-- Phase 7-8 = Bilingual -->
      <rect x="185" y="0" width="53"  height="40" fill="url(#band-bilingual)"/>
      <!-- Phase 9-14 = Auth + Profile + Curator + Visibility -->
      <rect x="238" y="0" width="159" height="40" fill="url(#band-auth)"/>
      <!-- Phase 15-21 = Profile fields + avatars + EXIF + orphan-cleanup -->
      <rect x="397" y="0" width="186" height="40" fill="url(#band-ops)"/>
      <!-- Phase 22-25 = Operational scripts -->
      <rect x="583" y="0" width="106" height="40" fill="url(#band-ops)"/>
      <!-- Phase 26-29 = Per-challenge UI + rationale markdown -->
      <rect x="689" y="0" width="106" height="40" fill="url(#band-editorial)"/>
      <!-- Phase 30-34 = Email + cron + subscriber -->
      <rect x="795" y="0" width="133" height="40" fill="url(#band-email)"/>
      <!-- Phase 35-36 = Moderation + privacy -->
      <rect x="928" y="0" width="53"  height="40" fill="url(#band-moderation)"/>
      <!-- Phase 37-44 = Markdown extension framework arc -->
      <rect x="981" y="0" width="213" height="40" fill="url(#band-markdown)"/>
      <!-- Phase 45 pending -->
      <rect x="1194" y="0" width="26" height="40" fill="url(#band-pending)" opacity="0.6"/>
    </g>

    <!-- Phase ticks (every phase) -->
    <g>
      <!-- vertical dividers every 5 phases -->
      <line x1="0"    y1="-10" x2="0"    y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="133"  y1="-10" x2="133"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="266"  y1="-10" x2="266"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="400"  y1="-10" x2="400"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="533"  y1="-10" x2="533"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="666"  y1="-10" x2="666"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="800"  y1="-10" x2="800"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="933"  y1="-10" x2="933"  y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="1066" y1="-10" x2="1066" y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
      <line x1="1200" y1="-10" x2="1200" y2="44" stroke="#cbd5e1" stroke-opacity="0.4"/>
    </g>

    <!-- phase ticks across the bottom -->
    <g font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#cbd5e1">
      <text x="0"    y="60" text-anchor="middle">P0</text>
      <text x="133"  y="60" text-anchor="middle">P5</text>
      <text x="266"  y="60" text-anchor="middle">P10</text>
      <text x="400"  y="60" text-anchor="middle">P15</text>
      <text x="533"  y="60" text-anchor="middle">P20</text>
      <text x="666"  y="60" text-anchor="middle">P25</text>
      <text x="800"  y="60" text-anchor="middle">P30</text>
      <text x="933"  y="60" text-anchor="middle">P35</text>
      <text x="1066" y="60" text-anchor="middle">P40</text>
      <text x="1194" y="60" text-anchor="middle" fill="#fbbf24" font-weight="700">P45 ⏸</text>
    </g>

    <!-- ADR markers (dots above the track) -->
    <g fill="#fbbf24">
      <!-- ADR 0001-0005 at P0 -->
      <circle cx="13" cy="-6" r="3.5"/>
      <!-- ADR 0006 at P3 -->
      <circle cx="93" cy="-6" r="3.5"/>
      <!-- ADR 0007 at P4 -->
      <circle cx="120" cy="-6" r="3.5"/>
      <!-- ADR 0008-0009 at P5 -->
      <circle cx="146" cy="-6" r="3.5"/>
      <!-- 0010 at P6 -->
      <circle cx="173" cy="-6" r="3.5"/>
      <!-- 0011 at P7 -->
      <circle cx="200" cy="-6" r="3.5"/>
      <!-- 0012-0013 at P9 -->
      <circle cx="253" cy="-6" r="3.5"/>
      <!-- 0014 at P12 -->
      <circle cx="333" cy="-6" r="3.5"/>
      <!-- 0015 at P14 -->
      <circle cx="386" cy="-6" r="3.5"/>
      <!-- 0016 at P15 -->
      <circle cx="413" cy="-6" r="3.5"/>
      <!-- 0017 at P16 -->
      <circle cx="440" cy="-6" r="3.5"/>
      <!-- 0018 at P17 -->
      <circle cx="466" cy="-6" r="3.5"/>
      <!-- 0019 at P19 -->
      <circle cx="520" cy="-6" r="3.5"/>
      <!-- 0020 at P28 -->
      <circle cx="760" cy="-6" r="3.5"/>
      <!-- 0021 at P30 -->
      <circle cx="813" cy="-6" r="3.5"/>
      <!-- 0022 at P31 -->
      <circle cx="840" cy="-6" r="3.5"/>
      <!-- 0023 at P33 -->
      <circle cx="893" cy="-6" r="3.5"/>
      <!-- 0024 at P35 -->
      <circle cx="946" cy="-6" r="3.5"/>
    </g>

    <!-- check marks per phase, inside band -->
    <g fill="#ffffff" font-size="11" text-anchor="middle">
      <!-- 45 check marks evenly spaced; for brevity skip individual marks and use single label -->
    </g>
  </g>

  <!-- Cluster labels (below track) -->
  <g transform="translate(40,202)" font-size="11">
    <g><line x1="0" y1="0" x2="79" y2="0" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#dbeafe" font-weight="700">Foundation</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P0–P2 · 5 ADRs</text>
    </g>
    <g transform="translate(85,0)"><line x1="0" y1="0" x2="100" y2="0" stroke="#a855f7" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#ede9fe" font-weight="700">Rating · DomainMap · Intel · Discussions</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P3–P6 · 5 ADRs</text>
    </g>
    <g transform="translate(191,0)"><line x1="0" y1="0" x2="47" y2="0" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#cffafe" font-weight="700">Bilingual</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P7–P8 · ADR-0011</text>
    </g>
    <g transform="translate(244,0)"><line x1="0" y1="0" x2="153" y2="0" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#fef3c7" font-weight="700">Auth · Profile · Curator · Visibility</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P9–P14 · 4 ADRs · §13 closed at P9</text>
    </g>
    <g transform="translate(403,0)"><line x1="0" y1="0" x2="286" y2="0" stroke="#f87171" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#fee2e2" font-weight="700">Profile fields · Avatars · EXIF · Operational scripts</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P15–P25 · 3 ADRs · 6 ops-script keystones</text>
    </g>
    <g transform="translate(695,0)"><line x1="0" y1="0" x2="100" y2="0" stroke="#10b981" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#d1fae5" font-weight="700">Editorial UX</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P26–P29 · ADR-0018 D-G #2/#3</text>
    </g>
    <g transform="translate(801,0)"><line x1="0" y1="0" x2="127" y2="0" stroke="#c084fc" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#ede9fe" font-weight="700">Subscriber · Email · Cron</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P30–P34 · 3 ADRs · 22-phase patience close</text>
    </g>
    <g transform="translate(934,0)"><line x1="0" y1="0" x2="47" y2="0" stroke="#2dd4bf" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#ccfbf1" font-weight="700">Moderation · Privacy</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P35–P36 · ADR-0024</text>
    </g>
    <g transform="translate(987,0)"><line x1="0" y1="0" x2="207" y2="0" stroke="#ec4899" stroke-width="3" stroke-linecap="round"/>
      <text x="0" y="20" fill="#fce7f3" font-weight="700">Markdown extension framework</text>
      <text x="0" y="36" fill="#94a3b8" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="10">P37–P44 · 8-phase arc · 12/12 triples</text>
    </g>
  </g>

  <!-- Bottom stats bar -->
  <g transform="translate(40,332)">
    <rect width="1200" height="60" rx="10" fill="#1e293b" stroke="#334155"/>
    <g transform="translate(20,16)" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><text y="14" fill="#94a3b8" letter-spacing="1.2">PHASES</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">45</text></g>
      <g transform="translate(110,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">ADRS</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">24</text></g>
      <g transform="translate(180,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">UNITS · CHANGELOG</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">~8.5k</text></g>
      <g transform="translate(330,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">VITEST FILES</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">71</text></g>
      <g transform="translate(450,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">VITEST TESTS</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">921</text></g>
      <g transform="translate(570,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">FIRST LOAD JS</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">103 kB</text></g>
      <g transform="translate(710,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">UNCHANGED-BUNDLE STREAK</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">85+</text></g>
      <g transform="translate(910,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">DB MIGRATIONS</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">9</text></g>
      <g transform="translate(1030,0)"><text y="14" fill="#94a3b8" letter-spacing="1.2">i18n KEYS · LOCALE</text><text y="32" fill="#fbbf24" font-size="22" font-weight="800">168</text></g>
    </g>
  </g>
</svg>
