<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="Phase ledger — Phase 0 through Phase 44 closed, Phase 45 in flight; 45 phases, 24 ADRs, 921 of 71 tests, 103 kB First Load JS unchanged for 85 consecutive units" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Phase ledger 0 → 45</title>
  <desc>Top: 45-phase timeline banded by thematic cluster, with ADR markers as gold dots above. Middle: 9 cluster cards in a 3-by-3 grid. Bottom: KPI strip with 9 headline metrics.</desc>
