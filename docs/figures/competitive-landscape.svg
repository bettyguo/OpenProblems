<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" role="img" aria-label="Competitive landscape — where LLM OpenProblems sits versus Papers with Code, Hugging Face Trending Papers, nlp-progress, OpenReview, arxiv-sanity, and Semantic Scholar" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Competitive landscape — problem-shaped vs paper-shaped, rated vs unrated</title>
  <desc>Top: a 2x2 positioning quadrant with X-axis "problem-shaped vs paper-shaped" and Y-axis "rated with methodology vs unrated". Bottom: a 6-row feature comparison table.</desc>
  <defs>
    <linearGradient id="bg-cl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="north-star" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbbf24"/><stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <radialGradient id="north-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="760" fill="url(#bg-cl)"/>

  <g transform="translate(40,40)">
    <text x="0" y="0" fill="#0f172a" font-size="26" font-weight="800" letter-spacing="-0.3">Competitive landscape · where this sits</text>
    <text x="0" y="22" fill="#475569" font-size="13">Six adjacent platforms, two orthogonal axes. The top-right quadrant (problem-shaped + rated with methodology) is empty — that's the gap this project fills.</text>
    <text x="1200" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 8 / 8</text>
    <text x="1200" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">MASTER_PROMPT.md · §1 · "WHY NOW"</text>
  </g>

  <!-- Quadrant chart. Origin (60,108). Plot area 580x320. Axis labels outside. -->
  <g transform="translate(60,108)">
    <!-- background -->
    <rect x="0" y="0" width="580" height="320" rx="10" fill="#ffffff" stroke="#cbd5e1"/>

    <!-- subtle quadrant fills -->
    <rect x="0"   y="0"   width="290" height="160" fill="#f1f5f9"/>
    <rect x="290" y="0"   width="290" height="160" fill="#fef3c7" opacity="0.6"/>
    <rect x="0"   y="160" width="290" height="160" fill="#f8fafc"/>
    <rect x="290" y="160" width="290" height="160" fill="#f1f5f9"/>

    <!-- cross axes -->
    <line x1="290" y1="0"   x2="290" y2="320" stroke="#cbd5e1" stroke-dasharray="4 4"/>
    <line x1="0"   y1="160" x2="580" y2="160" stroke="#cbd5e1" stroke-dasharray="4 4"/>

    <!-- north-star glow + LOP pin (top-right, the empty quadrant) -->
    <ellipse cx="435" cy="80" rx="110" ry="74" fill="url(#north-glow)"/>
    <g transform="translate(435,80)">
      <circle r="34" fill="url(#north-star)"/>
      <text y="6" text-anchor="middle" fill="#0b1437" font-size="12" font-weight="800">LLM</text>
      <text y="20" text-anchor="middle" fill="#0b1437" font-size="10" font-weight="700">OpenProblems</text>
    </g>
    <text x="435" y="158" text-anchor="middle" fill="#92400e" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">★ NORTH-STAR QUADRANT</text>

    <!-- Papers with Code: paper-shaped, partially rated (sunsetted) -->
    <g transform="translate(180,90)">
      <circle r="26" fill="#9ca3af"/>
      <text y="4" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Papers</text>
      <text y="14" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">with Code</text>
      <text y="40" text-anchor="middle" fill="#6b7280" font-size="9" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SUNSETTED · JUL 2025</text>
    </g>

    <!-- OpenReview: paper-shaped, partially rated (reviews) -->
    <g transform="translate(80,120)">
      <circle r="24" fill="#7c3aed"/>
      <text y="0" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Open</text>
      <text y="11" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Review</text>
    </g>

    <!-- nlp-progress: list-of-papers, unrated -->
    <g transform="translate(110,235)">
      <circle r="22" fill="#0d9488"/>
      <text y="0" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">nlp-</text>
      <text y="11" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">progress</text>
    </g>

    <!-- Hugging Face Trending: paper feed, unrated -->
    <g transform="translate(200,270)">
      <circle r="22" fill="#f59e0b" opacity="0.7"/>
      <text y="0" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">HF</text>
      <text y="11" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Trending</text>
    </g>

    <!-- arxiv-sanity: paper recommender, unrated -->
    <g transform="translate(370,240)">
      <circle r="22" fill="#dc2626" opacity="0.7"/>
      <text y="0" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">arxiv-</text>
      <text y="11" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">sanity</text>
    </g>

    <!-- Semantic Scholar: paper search, unrated -->
    <g transform="translate(490,260)">
      <circle r="22" fill="#0ea5e9" opacity="0.7"/>
      <text y="0" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Semantic</text>
      <text y="11" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Scholar</text>
    </g>

    <!-- Wikipedia: mixed shapes, unrated -->
    <g transform="translate(400,290)">
      <circle r="18" fill="#475569" opacity="0.7"/>
      <text y="4" text-anchor="middle" fill="#ffffff" font-size="9" font-weight="700">Wikipedia</text>
    </g>
  </g>

  <!-- Axis labels (outside the plot box) -->
  <!-- Y-axis label (vertical, on left of plot, rotated) -->
  <g transform="translate(40,268) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6">↑ RATED · METHODOLOGY-BACKED</text>
  </g>
  <g transform="translate(40,400) rotate(-90)">
    <text x="0" y="0" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6">UNRATED ↓</text>
  </g>

  <!-- X-axis labels (below plot) -->
  <g transform="translate(60,452)">
    <text x="145" y="0" text-anchor="middle" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6">← PAPER- / FEED-SHAPED</text>
    <text x="435" y="0" text-anchor="middle" fill="#475569" font-size="11" font-weight="600" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.6">PROBLEM-SHAPED →</text>
  </g>

  <!-- Legend panel (right side of quadrant) -->
  <g transform="translate(680,108)">
    <rect width="560" height="320" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="20" y="28" fill="#0f172a" font-size="15" font-weight="700">Why the gap exists — and why we fill it</text>

    <g transform="translate(20,52)" font-size="12">
      <g>
        <circle cx="6" cy="14" r="6" fill="#9ca3af"/>
        <text x="22" y="18" fill="#0f172a" font-weight="700">Papers with Code</text>
        <text x="22" y="34" fill="#475569">Closest precedent, but sunsetted (Jul 2025) — and</text>
        <text x="22" y="50" fill="#475569">paper-shaped at root: ⟨task, dataset, metric⟩ rows, not</text>
        <text x="22" y="66" fill="#475569">"open problems" with methodology-backed ratings.</text>
      </g>
      <g transform="translate(0,80)">
        <circle cx="6" cy="14" r="6" fill="#f59e0b" opacity="0.7"/>
        <text x="22" y="18" fill="#0f172a" font-weight="700">Hugging Face Trending Papers</text>
        <text x="22" y="34" fill="#475569">Excellent feed, but feed-shaped — answers "what's hot</text>
        <text x="22" y="50" fill="#475569">this week" not "where is the field stuck on Y?"</text>
      </g>
      <g transform="translate(0,138)">
        <circle cx="6" cy="14" r="6" fill="#0d9488"/>
        <text x="22" y="18" fill="#0f172a" font-weight="700">nlp-progress / OpenReview / arxiv-sanity</text>
        <text x="22" y="34" fill="#475569">Curated lists, peer-review aggregator, paper</text>
        <text x="22" y="50" fill="#475569">recommender — each useful, none rate problems.</text>
      </g>
      <g transform="translate(0,196)">
        <circle cx="6" cy="14" r="6" fill="url(#north-star)"/>
        <text x="22" y="18" fill="#0f172a" font-weight="700">LLM OpenProblems · this project</text>
        <text x="22" y="34" fill="#475569">Problem-shaped + rated + methodology-backed</text>
        <text x="22" y="50" fill="#475569">+ immutable rating-action ledger + revisable history</text>
        <text x="22" y="66" fill="#475569">— a coordination signal, not a feed or a list.</text>
      </g>
    </g>
  </g>

  <!-- Feature comparison table -->
  <g transform="translate(40,500)">
    <text x="0" y="0" fill="#0f172a" font-size="15" font-weight="700">Feature comparison</text>
    <text x="0" y="20" fill="#94a3b8" font-size="11">✓ = first-class · ◐ = partial · ✗ = not the design intent · — = unknown / N/A</text>

    <!-- table -->
    <g transform="translate(0,36)">
      <!-- header row -->
      <g>
        <rect width="1200" height="36" rx="6" fill="#1e293b"/>
        <text x="20"   y="22" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">PLATFORM</text>
        <text x="290"  y="22" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">PROBLEM-SHAPED</text>
        <text x="450"  y="22" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">RATED</text>
        <text x="600"  y="22" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">CURATED TAXONOMY</text>
        <text x="770"  y="22" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">REVISION HISTORY</text>
        <text x="930"  y="22" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">ACTIVE 2026</text>
        <text x="1080" y="22" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.2">CITABLE</text>
      </g>

      <!-- LOP highlighted row -->
      <g transform="translate(0,40)">
        <rect width="1200" height="32" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
        <text x="20"   y="20" fill="#92400e" font-size="12" font-weight="800">★ LLM OpenProblems</text>
        <text x="290"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">✓</text>
        <text x="450"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">✓</text>
        <text x="600"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">✓</text>
        <text x="770"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">✓</text>
        <text x="930"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">✓</text>
        <text x="1080" y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="800">✓</text>
      </g>

      <!-- Papers with Code -->
      <g transform="translate(0,76)">
        <rect width="1200" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="20"   y="20" fill="#1e293b" font-size="12">Papers with Code</text>
        <text x="290"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="450"  y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
        <text x="600"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
        <text x="770"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="930"  y="20" text-anchor="middle" fill="#dc2626" font-size="12" font-weight="700">sunsetted</text>
        <text x="1080" y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
      </g>

      <!-- Hugging Face Trending -->
      <g transform="translate(0,112)">
        <rect width="1200" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="20"   y="20" fill="#1e293b" font-size="12">Hugging Face Trending Papers</text>
        <text x="290"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="450"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="600"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="770"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="930"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
        <text x="1080" y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
      </g>

      <!-- nlp-progress -->
      <g transform="translate(0,148)">
        <rect width="1200" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="20"   y="20" fill="#1e293b" font-size="12">nlp-progress</text>
        <text x="290"  y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
        <text x="450"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="600"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
        <text x="770"  y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
        <text x="930"  y="20" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">stale</text>
        <text x="1080" y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
      </g>

      <!-- OpenReview -->
      <g transform="translate(0,184)">
        <rect width="1200" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="20"   y="20" fill="#1e293b" font-size="12">OpenReview</text>
        <text x="290"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="450"  y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
        <text x="600"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="770"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
        <text x="930"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
        <text x="1080" y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
      </g>

      <!-- Semantic Scholar -->
      <g transform="translate(0,220)">
        <rect width="1200" height="32" rx="6" fill="#ffffff" stroke="#e2e8f0"/>
        <text x="20"   y="20" fill="#1e293b" font-size="12">Semantic Scholar / arxiv-sanity / Wikipedia</text>
        <text x="290"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="450"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="600"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="770"  y="20" text-anchor="middle" fill="#dc2626" font-size="14" font-weight="700">✗</text>
        <text x="930"  y="20" text-anchor="middle" fill="#059669" font-size="14" font-weight="700">✓</text>
        <text x="1080" y="20" text-anchor="middle" fill="#94a3b8" font-size="14" font-weight="700">◐</text>
      </g>
    </g>
  </g>
</svg>
