<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-label="Development workflow rhythm — THINK, DESIGN, CODE, ITERATE, CHANGELOG, commit — one unit at a time" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Development workflow rhythm</title>
  <defs>
    <linearGradient id="bg-wf" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <marker id="arrow-wf" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto"><path d="M 0 0 L 12 6 L 0 12 z" fill="#475569"/></marker>
    <marker id="loop-arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto"><path d="M 0 0 L 12 6 L 0 12 z" fill="#dc2626"/></marker>
  </defs>
  <rect width="1280" height="540" fill="url(#bg-wf)"/>

  <g transform="translate(40,36)">
    <text x="0" y="0" fill="#0f172a" font-size="26" font-weight="800" letter-spacing="-0.3">Development workflow · one unit at a time</text>
    <text x="0" y="22" fill="#475569" font-size="13">5-step rhythm per unit. Don't batch. Commit after each unit. Pre-commit hooks gate the rhythm.</text>
    <text x="1240" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 7 / 7</text>
    <text x="1240" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">MASTER_PROMPT.md · §15</text>
  </g>

  <!-- 5 step nodes evenly spaced. Origin (60,128). Each node 200 wide, gap 32. Total = 5*200+4*32 = 1128. -->

  <!-- THINK -->
  <g transform="translate(60,128)">
    <rect width="200" height="160" rx="14" fill="#1e3a8a"/>
    <circle cx="36" cy="36" r="20" fill="#fbbf24"/>
    <text x="36" y="42" text-anchor="middle" fill="#0b1437" font-size="20" font-weight="800">1</text>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="800">THINK</text>
    <text x="20" y="84" fill="#dbeafe" font-size="12">Write a THINK artifact in</text>
    <text x="20" y="100" fill="#dbeafe" font-size="12">`docs/thinking/&lt;unit&gt;.md`</text>
    <text x="20" y="128" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">CARDINAL RULE</text>
    <text x="20" y="144" fill="#dbeafe" font-size="11">Don't touch code until ✓</text>
  </g>

  <!-- DESIGN -->
  <g transform="translate(292,128)">
    <rect width="200" height="160" rx="14" fill="#6d28d9"/>
    <circle cx="36" cy="36" r="20" fill="#fbbf24"/>
    <text x="36" y="42" text-anchor="middle" fill="#0b1437" font-size="20" font-weight="800">2</text>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="800">DESIGN</text>
    <text x="20" y="84" fill="#ede9fe" font-size="12">If decision is architectural,</text>
    <text x="20" y="100" fill="#ede9fe" font-size="12">draft an ADR in</text>
    <text x="20" y="116" fill="#ede9fe" font-size="12">`docs/adr/` (MADR-style).</text>
    <text x="20" y="144" fill="#fbbf24" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">+1 ADR · OR · APPEND</text>
  </g>

  <!-- CODE -->
  <g transform="translate(524,128)">
    <rect width="200" height="160" rx="14" fill="#047857"/>
    <circle cx="36" cy="36" r="20" fill="#fbbf24"/>
    <text x="36" y="42" text-anchor="middle" fill="#0b1437" font-size="20" font-weight="800">3</text>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="800">CODE</text>
    <text x="20" y="84" fill="#d1fae5" font-size="12">Implement minimally. No</text>
    <text x="20" y="100" fill="#d1fae5" font-size="12">scope drift. Surface XSS-</text>
    <text x="20" y="116" fill="#d1fae5" font-size="12">audit if new innerHTML.</text>
    <text x="20" y="144" fill="#fbbf24" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STRICT TS · ZOD</text>
  </g>

  <!-- ITERATE -->
  <g transform="translate(756,128)">
    <rect width="200" height="160" rx="14" fill="#b45309"/>
    <circle cx="36" cy="36" r="20" fill="#fbbf24"/>
    <text x="36" y="42" text-anchor="middle" fill="#0b1437" font-size="20" font-weight="800">4</text>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="800">ITERATE</text>
    <text x="20" y="84" fill="#fef3c7" font-size="12">Smoke gates: typecheck,</text>
    <text x="20" y="100" fill="#fef3c7" font-size="12">lint, test, validate-content,</text>
    <text x="20" y="116" fill="#fef3c7" font-size="12">audit-content, build, e2e.</text>
    <text x="20" y="144" fill="#fbbf24" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">ALL GREEN BEFORE 5</text>
  </g>

  <!-- COMMIT -->
  <g transform="translate(988,128)">
    <rect width="200" height="160" rx="14" fill="#dc2626"/>
    <circle cx="36" cy="36" r="20" fill="#fbbf24"/>
    <text x="36" y="42" text-anchor="middle" fill="#0b1437" font-size="20" font-weight="800">5</text>
    <text x="68" y="42" fill="#ffffff" font-size="20" font-weight="800">COMMIT</text>
    <text x="20" y="84" fill="#fee2e2" font-size="12">Update CHANGELOG · open</text>
    <text x="20" y="100" fill="#fee2e2" font-size="12">Phase / Unit section, write</text>
    <text x="20" y="116" fill="#fee2e2" font-size="12">unit summary. Then commit.</text>
    <text x="20" y="144" fill="#fbbf24" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">NEVER --no-verify</text>
  </g>

  <!-- arrows linking 1→2→3→4→5 -->
  <g stroke="#475569" stroke-width="2.4" fill="none">
    <line x1="260" y1="208" x2="292" y2="208" marker-end="url(#arrow-wf)"/>
    <line x1="492" y1="208" x2="524" y2="208" marker-end="url(#arrow-wf)"/>
    <line x1="724" y1="208" x2="756" y2="208" marker-end="url(#arrow-wf)"/>
    <line x1="956" y1="208" x2="988" y2="208" marker-end="url(#arrow-wf)"/>
  </g>

  <!-- iterate-back loop (4 → 3) — small dashed arc beneath step 4 -->
  <g stroke="#dc2626" stroke-width="1.8" fill="none" stroke-dasharray="5 4">
    <path d="M 756 288 Q 700 326 644 288" marker-end="url(#loop-arrow)"/>
  </g>
  <text x="700" y="338" text-anchor="middle" fill="#dc2626" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-weight="700">REGRESS → BACK TO STEP 3</text>

  <!-- next-unit loop -->
  <g stroke="#475569" stroke-width="2" fill="none" stroke-dasharray="6 4">
    <path d="M 1088 288 Q 1140 360 1088 432 Q 600 432 60 432 Q 0 360 60 288" marker-end="url(#arrow-wf)"/>
  </g>
  <text x="600" y="424" text-anchor="middle" fill="#475569" font-size="12" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">NEXT UNIT · ONE UNIT AT A TIME · DON'T BATCH</text>

  <!-- Bottom strip: pre-commit hook chain -->
  <g transform="translate(40,460)">
    <rect width="1200" height="56" rx="12" fill="#0f172a"/>
    <g transform="translate(20,16)" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <text x="0" y="14" fill="#94a3b8" letter-spacing="1.4">PRE-COMMIT HOOK CHAIN</text>
      <g transform="translate(200,0)">
        <g><rect width="180" height="28" rx="6" fill="#1e3a8a"/><text x="90" y="18" text-anchor="middle" fill="#ffffff" font-weight="700">ADR-0005 immutability</text></g>
        <text x="186" y="18" fill="#94a3b8">→</text>
        <g transform="translate(196,0)"><rect width="160" height="28" rx="6" fill="#6d28d9"/><text x="80" y="18" text-anchor="middle" fill="#ffffff" font-weight="700">lint-staged + prettier</text></g>
        <text x="362" y="18" fill="#94a3b8">→</text>
        <g transform="translate(372,0)"><rect width="120" height="28" rx="6" fill="#047857"/><text x="60" y="18" text-anchor="middle" fill="#ffffff" font-weight="700">pnpm test</text></g>
        <text x="498" y="18" fill="#94a3b8">→</text>
        <g transform="translate(508,0)"><rect width="220" height="28" rx="6" fill="#b91c1c"/><text x="110" y="18" text-anchor="middle" fill="#ffffff" font-weight="700">commitlint · 100-char header</text></g>
      </g>
    </g>
  </g>
</svg>
