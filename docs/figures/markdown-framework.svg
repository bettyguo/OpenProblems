<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 820" role="img" aria-label="Markdown extension framework — Phase 37 to 44 — 12 of 12 component-surface-slot triples active under default dispatch" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Markdown extension framework — full activation at Phase 44</title>
  <defs>
    <linearGradient id="bg-mk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="wikilinks" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="tables" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="arxiv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dc2626"/><stop offset="1" stop-color="#b91c1c"/>
    </linearGradient>
    <linearGradient id="doi" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9ca3af"/><stop offset="1" stop-color="#6b7280"/>
    </linearGradient>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#cbd5e1" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1280" height="820" fill="url(#bg-mk)"/>

  <!-- title -->
  <g transform="translate(40,36)">
    <text x="0" y="0" fill="#0f172a" font-size="26" font-weight="800" letter-spacing="-0.3">Markdown extension framework</text>
    <text x="0" y="22" fill="#475569" font-size="13">Phase 37 framework · Phase 38–41 consumers · Phase 42–44 cross-surface expansions · <tspan font-weight="700" fill="#0f172a">12 / 12 component-surface-slot triples ACTIVE under default dispatch</tspan></text>
    <text x="1240" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 3 / 7</text>
    <text x="1240" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">ADR-0018 · D-G · 11 APPENDS</text>
  </g>

  <!-- consumer legend (top) -->
  <g transform="translate(40,96)" font-size="11">
    <text x="0" y="0" fill="#64748b" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">CONSUMERS · ROW BANDS</text>
    <g transform="translate(0,16)">
      <rect width="14" height="14" fill="url(#wikilinks)" rx="3"/><text x="22" y="11" fill="#1e293b" font-weight="600">Wikilinks · Phase 38</text><text x="158" y="11" fill="#64748b">rehypePlugins</text>
    </g>
    <g transform="translate(280,16)">
      <rect width="14" height="14" fill="url(#tables)" rx="3"/><text x="22" y="11" fill="#1e293b" font-weight="600">Tables · Phase 39</text><text x="148" y="11" fill="#64748b">schemaOverrides</text>
    </g>
    <g transform="translate(560,16)">
      <rect width="14" height="14" fill="url(#arxiv)" rx="3"/><text x="22" y="11" fill="#1e293b" font-weight="600">arXiv · Phase 41</text><text x="138" y="11" fill="#64748b">remarkPlugins</text>
    </g>
    <g transform="translate(820,16)">
      <rect width="14" height="14" fill="url(#doi)" rx="3"/><text x="22" y="11" fill="#1e293b" font-weight="600">DOI · Phase 45 (in-flight)</text><text x="190" y="11" fill="#64748b">remarkPlugins (sibling of arXiv)</text>
    </g>
  </g>

  <!-- The 3 x 4 grid -->
  <!-- Grid origin: (120, 160). Cell size: 264 wide x 130 tall. Gap: 16. -->
  <!-- 4 surfaces as column headers -->
  <g transform="translate(120,160)">
    <!-- column headers -->
    <g font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">
      <text x="132" y="-14">bio</text>
      <text x="412" y="-14">reviewNotes</text>
      <text x="692" y="-14">rationale</text>
      <text x="972" y="-14">actionRationale</text>
    </g>
    <g font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#94a3b8" text-anchor="middle">
      <text x="132" y="2">Phase 17 surface</text>
      <text x="412" y="2">Phase 18 surface</text>
      <text x="692" y="2">Phase 27 surface</text>
      <text x="972" y="2">Phase 29 surface</text>
    </g>

    <!-- row labels (right edge of left gutter) -->
    <g font-size="13" font-weight="700" fill="#0f172a" text-anchor="end">
      <text x="-24" y="76">Wikilinks</text>
      <text x="-24" y="222">Tables</text>
      <text x="-24" y="368">arXiv</text>
    </g>
    <g font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" fill="#94a3b8" text-anchor="end">
      <text x="-24" y="92">rehypePlugins</text>
      <text x="-24" y="238">schemaOverrides</text>
      <text x="-24" y="384">remarkPlugins</text>
    </g>

    <!-- Row 1: Wikilinks across 4 surfaces -->
    <!-- bio -->
    <g transform="translate(0,16)">
      <rect width="264" height="130" rx="10" fill="url(#wikilinks)"/>
      <text x="16" y="22" fill="#e9d5ff" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P38 → P42 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">[[slug]]</text>
      <text x="16" y="84" fill="#f3e8ff" font-size="11">rehype plugin emits</text>
      <text x="16" y="100" fill="#f3e8ff" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">&lt;a href="/p/&lt;slug&gt;"&gt;</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <!-- reviewNotes -->
    <g transform="translate(280,16)">
      <rect width="264" height="130" rx="10" fill="url(#wikilinks)"/>
      <text x="16" y="22" fill="#e9d5ff" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P38 → P42 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">[[slug]]</text>
      <text x="16" y="84" fill="#f3e8ff" font-size="11">curator cross-links to</text>
      <text x="16" y="100" fill="#f3e8ff" font-size="11">problems / papers</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <!-- rationale -->
    <g transform="translate(560,16)">
      <rect width="264" height="130" rx="10" fill="url(#wikilinks)"/>
      <text x="16" y="22" fill="#e9d5ff" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P38 → P42 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">[[slug]]</text>
      <text x="16" y="84" fill="#f3e8ff" font-size="11">paper-card prose</text>
      <text x="16" y="100" fill="#f3e8ff" font-size="11">references resolved</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <!-- actionRationale -->
    <g transform="translate(840,16)">
      <rect width="264" height="130" rx="10" fill="url(#wikilinks)"/>
      <text x="16" y="22" fill="#e9d5ff" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P38 → P42 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">[[slug]]</text>
      <text x="16" y="84" fill="#f3e8ff" font-size="11">rating-action MDX</text>
      <text x="16" y="100" fill="#f3e8ff" font-size="11">cite-able linking</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>

    <!-- Row 2: Tables -->
    <g transform="translate(0,162)">
      <rect width="264" height="130" rx="10" fill="url(#tables)"/>
      <text x="16" y="22" fill="#a7f3d0" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P39 → P43 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">GFM tables</text>
      <text x="16" y="84" fill="#ccfbf1" font-size="11">schemaOverrides extend</text>
      <text x="16" y="100" fill="#ccfbf1" font-size="11">rehype-sanitize allow-list</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <g transform="translate(280,162)">
      <rect width="264" height="130" rx="10" fill="url(#tables)"/>
      <text x="16" y="22" fill="#a7f3d0" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P39 → P43 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">| col | col |</text>
      <text x="16" y="84" fill="#ccfbf1" font-size="11">reviewNotes structured</text>
      <text x="16" y="100" fill="#ccfbf1" font-size="11">comparison tables</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <g transform="translate(560,162)">
      <rect width="264" height="130" rx="10" fill="url(#tables)"/>
      <text x="16" y="22" fill="#a7f3d0" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P39 → P43 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">| - | - |</text>
      <text x="16" y="84" fill="#ccfbf1" font-size="11">rationale comparison</text>
      <text x="16" y="100" fill="#ccfbf1" font-size="11">tables (SOTA, methods)</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <g transform="translate(840,162)">
      <rect width="264" height="130" rx="10" fill="url(#tables)"/>
      <text x="16" y="22" fill="#a7f3d0" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P39 → P43 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">tables</text>
      <text x="16" y="84" fill="#ccfbf1" font-size="11">rating-action methodology</text>
      <text x="16" y="100" fill="#ccfbf1" font-size="11">version comparison</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>

    <!-- Row 3: arXiv -->
    <g transform="translate(0,308)">
      <rect width="264" height="130" rx="10" fill="url(#arxiv)"/>
      <text x="16" y="22" fill="#fecaca" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P41 → P44 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">arxiv:2024.01234</text>
      <text x="16" y="84" fill="#fee2e2" font-size="11">remark plugin emits</text>
      <text x="16" y="100" fill="#fee2e2" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">arxiv.org/abs/&lt;id&gt;</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <g transform="translate(280,308)">
      <rect width="264" height="130" rx="10" fill="url(#arxiv)"/>
      <text x="16" y="22" fill="#fecaca" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P41 → P44 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">arxiv:NNNN</text>
      <text x="16" y="84" fill="#fee2e2" font-size="11">curator prose autolinks</text>
      <text x="16" y="100" fill="#fee2e2" font-size="11">academic citations</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
    <g transform="translate(560,308)">
      <rect width="264" height="130" rx="10" fill="url(#arxiv)"/>
      <text x="16" y="22" fill="#fecaca" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P41 → P44 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">arxiv: + doi:</text>
      <text x="16" y="84" fill="#fee2e2" font-size="11">first compositional</text>
      <text x="16" y="100" fill="#fee2e2" font-size="11">same-slot case (Phase 45)</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE  ↟ DOI joins</text>
    </g>
    <g transform="translate(840,308)">
      <rect width="264" height="130" rx="10" fill="url(#arxiv)"/>
      <text x="16" y="22" fill="#fecaca" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">P41 → P44 EXPANDED</text>
      <text x="16" y="56" fill="#ffffff" font-size="20" font-weight="800">arxiv:NNNN</text>
      <text x="16" y="84" fill="#fee2e2" font-size="11">rating-action methodology</text>
      <text x="16" y="100" fill="#fee2e2" font-size="11">cite paper-card sources</text>
      <text x="16" y="118" fill="#fbbf24" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">✓ ACTIVE</text>
    </g>
  </g>

  <!-- bottom panel: dispatch + composition rule -->
  <g transform="translate(40,634)">
    <rect width="1200" height="148" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
    <text x="20" y="28" fill="#0f172a" font-size="13" font-weight="700">Composition rule (ADR-0018 · APPEND-D-R)</text>
    <text x="20" y="48" fill="#475569" font-size="12">Under `MARKDOWN_EXTENSIONS=&lt;a&gt;,&lt;b&gt;,&lt;c&gt;` the `CompositeExtensionRegistry` concatenates per-slot in registration order.</text>

    <!-- env-var pill row -->
    <g transform="translate(20,68)" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <text x="0" y="0" fill="#64748b" letter-spacing="1.4">DISPATCH ARMS</text>
      <g transform="translate(0,12)">
        <g><rect width="92" height="26" rx="13" fill="#e2e8f0"/><text x="46" y="18" text-anchor="middle" fill="#0f172a" font-weight="700">default</text></g>
        <g transform="translate(102,0)"><rect width="92" height="26" rx="13" fill="#ede9fe"/><text x="46" y="18" text-anchor="middle" fill="#5b21b6" font-weight="700">wikilinks</text></g>
        <g transform="translate(204,0)"><rect width="92" height="26" rx="13" fill="#ccfbf1"/><text x="46" y="18" text-anchor="middle" fill="#0f766e" font-weight="700">tables</text></g>
        <g transform="translate(306,0)"><rect width="92" height="26" rx="13" fill="#fee2e2"/><text x="46" y="18" text-anchor="middle" fill="#b91c1c" font-weight="700">arxiv</text></g>
        <g transform="translate(408,0)"><rect width="92" height="26" rx="13" fill="#f3f4f6" stroke="#9ca3af" stroke-dasharray="3 2"/><text x="46" y="18" text-anchor="middle" fill="#374151" font-weight="700">doi (P45)</text></g>
        <g transform="translate(510,0)"><rect width="170" height="26" rx="13" fill="#fef3c7"/><text x="85" y="18" text-anchor="middle" fill="#92400e" font-weight="700">wikilinks,tables,arxiv</text></g>
        <g transform="translate(692,0)"><rect width="200" height="26" rx="13" fill="#fde68a" stroke="#f59e0b"/><text x="100" y="18" text-anchor="middle" fill="#92400e" font-weight="700">wikilinks,tables,arxiv,doi</text></g>
      </g>
      <text x="0" y="76" fill="#94a3b8">3 slots × 4 surfaces × 3 consumers = 12 triples ACTIVE since Phase 44. Phase 45 adds 4th consumer (DOI) on `remarkPlugins` of `rationale` → first same-slot composition.</text>
    </g>
  </g>
</svg>
