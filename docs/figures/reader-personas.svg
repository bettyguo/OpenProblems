<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 540" role="img" aria-label="Three reader personas — Surveyor, Frontier Pusher, Strategist — and what they want from the platform" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Three reader personas</title>
  <defs>
    <linearGradient id="bg-rp" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/></linearGradient>
    <linearGradient id="surveyor" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1d4ed8"/><stop offset="1" stop-color="#3b82f6"/></linearGradient>
    <linearGradient id="pusher" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#047857"/><stop offset="1" stop-color="#10b981"/></linearGradient>
    <linearGradient id="strategist" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#b45309"/><stop offset="1" stop-color="#f59e0b"/></linearGradient>
  </defs>
  <rect width="1280" height="540" fill="url(#bg-rp)"/>

  <g transform="translate(40,36)">
    <text x="0" y="0" fill="#0f172a" font-size="26" font-weight="800" letter-spacing="-0.3">Three reader personas</text>
    <text x="0" y="22" fill="#475569" font-size="13">Every page must serve all three. Information architecture is judged against this contract.</text>
    <text x="1240" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 6 / 7</text>
    <text x="1240" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">MASTER_PROMPT.md · §3.2</text>
  </g>

  <!-- 3 cards, each 392 wide, gap 16, total 3*392+2*16 = 1208. Origin (36,108) -->

  <!-- Surveyor -->
  <g transform="translate(36,108)">
    <rect width="392" height="400" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="392" height="92" rx="14" fill="url(#surveyor)"/>
    <rect y="78" width="392" height="14" fill="url(#surveyor)"/>
    <!-- icon: telescope -->
    <g transform="translate(20,18)">
      <circle cx="28" cy="28" r="26" fill="#ffffff" opacity="0.18"/>
      <g transform="translate(12,12)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round">
        <circle cx="16" cy="16" r="12"/>
        <line x1="24" y1="24" x2="32" y2="32"/>
      </g>
    </g>
    <text x="88" y="40" fill="#dbeafe" font-size="11" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">PERSONA 1</text>
    <text x="88" y="64" fill="#ffffff" font-size="22" font-weight="800">The Surveyor</text>
    <text x="20" y="124" fill="#1e293b" font-size="13" font-style="italic">"I'm writing a background section.</text>
    <text x="20" y="142" fill="#1e293b" font-size="13" font-style="italic">Give me a curated landscape."</text>

    <text x="20" y="176" fill="#1e3a8a" font-size="11" letter-spacing="1.4" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SIGNALS THEY WANT</text>
    <g transform="translate(20,184)" font-size="12">
      <g><circle cx="6" cy="14" r="5" fill="#1d4ed8"/><text x="20" y="18" fill="#1e293b">Taxonomy you can trust</text></g>
      <g transform="translate(0,22)"><circle cx="6" cy="14" r="5" fill="#1d4ed8"/><text x="20" y="18" fill="#1e293b">Canonical key papers per subfield</text></g>
      <g transform="translate(0,44)"><circle cx="6" cy="14" r="5" fill="#1d4ed8"/><text x="20" y="18" fill="#1e293b">Current SOTA + ceiling estimate</text></g>
      <g transform="translate(0,66)"><circle cx="6" cy="14" r="5" fill="#1d4ed8"/><text x="20" y="18" fill="#1e293b">Stable, citable URLs</text></g>
      <g transform="translate(0,88)"><circle cx="6" cy="14" r="5" fill="#1d4ed8"/><text x="20" y="18" fill="#1e293b">Rating rationales, not just numbers</text></g>
    </g>

    <text x="20" y="320" fill="#1e3a8a" font-size="11" letter-spacing="1.4" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SURFACES THEY USE</text>
    <g transform="translate(20,332)" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><rect width="100" height="22" rx="11" fill="#dbeafe"/><text x="50" y="15" text-anchor="middle" fill="#1e3a8a" font-weight="700">/domains</text></g>
      <g transform="translate(108,0)"><rect width="120" height="22" rx="11" fill="#dbeafe"/><text x="60" y="15" text-anchor="middle" fill="#1e3a8a" font-weight="700">/problems/[slug]</text></g>
      <g transform="translate(236,0)"><rect width="96" height="22" rx="11" fill="#dbeafe"/><text x="48" y="15" text-anchor="middle" fill="#1e3a8a" font-weight="700">/papers</text></g>
    </g>
    <text x="20" y="380" fill="#94a3b8" font-size="11">Outcome: a defensible "background" section + cited URLs</text>
  </g>

  <!-- Frontier Pusher -->
  <g transform="translate(444,108)">
    <rect width="392" height="400" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="392" height="92" rx="14" fill="url(#pusher)"/>
    <rect y="78" width="392" height="14" fill="url(#pusher)"/>
    <!-- icon: rocket -->
    <g transform="translate(20,18)">
      <circle cx="28" cy="28" r="26" fill="#ffffff" opacity="0.18"/>
      <g transform="translate(12,12)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 8 22 L 16 8 L 24 22 L 16 28 z"/>
        <line x1="16" y1="10" x2="16" y2="22"/>
      </g>
    </g>
    <text x="88" y="40" fill="#a7f3d0" font-size="11" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">PERSONA 2</text>
    <text x="88" y="64" fill="#ffffff" font-size="22" font-weight="800">The Frontier Pusher</text>
    <text x="20" y="124" fill="#1e293b" font-size="13" font-style="italic">"Who's beating me on this</text>
    <text x="20" y="142" fill="#1e293b" font-size="13" font-style="italic">benchmark, and by how much?"</text>

    <text x="20" y="176" fill="#065f46" font-size="11" letter-spacing="1.4" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SIGNALS THEY WANT</text>
    <g transform="translate(20,184)" font-size="12">
      <g><circle cx="6" cy="14" r="5" fill="#047857"/><text x="20" y="18" fill="#1e293b">Leaderboards · ⟨task, ds, metric⟩</text></g>
      <g transform="translate(0,22)"><circle cx="6" cy="14" r="5" fill="#047857"/><text x="20" y="18" fill="#1e293b">Recent rating-actions (movers)</text></g>
      <g transform="translate(0,44)"><circle cx="6" cy="14" r="5" fill="#047857"/><text x="20" y="18" fill="#1e293b">Direct competitor handles</text></g>
      <g transform="translate(0,66)"><circle cx="6" cy="14" r="5" fill="#047857"/><text x="20" y="18" fill="#1e293b">Submit own entry + challenge rating</text></g>
      <g transform="translate(0,88)"><circle cx="6" cy="14" r="5" fill="#047857"/><text x="20" y="18" fill="#1e293b">Watchlist + email digest</text></g>
    </g>

    <text x="20" y="320" fill="#065f46" font-size="11" letter-spacing="1.4" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SURFACES THEY USE</text>
    <g transform="translate(20,332)" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><rect width="100" height="22" rx="11" fill="#d1fae5"/><text x="50" y="15" text-anchor="middle" fill="#065f46" font-weight="700">/trending</text></g>
      <g transform="translate(108,0)"><rect width="100" height="22" rx="11" fill="#d1fae5"/><text x="50" y="15" text-anchor="middle" fill="#065f46" font-weight="700">/ratings</text></g>
      <g transform="translate(216,0)"><rect width="88" height="22" rx="11" fill="#d1fae5"/><text x="44" y="15" text-anchor="middle" fill="#065f46" font-weight="700">/u/[h]</text></g>
      <g transform="translate(312,0)"><rect width="56" height="22" rx="11" fill="#d1fae5"/><text x="28" y="15" text-anchor="middle" fill="#065f46" font-weight="700">⭐ ★</text></g>
    </g>
    <text x="20" y="380" fill="#94a3b8" font-size="11">Outcome: a sharper competitor map + open rating-challenge</text>
  </g>

  <!-- Strategist -->
  <g transform="translate(852,108)">
    <rect width="392" height="400" rx="14" fill="#ffffff" stroke="#e2e8f0"/>
    <rect width="392" height="92" rx="14" fill="url(#strategist)"/>
    <rect y="78" width="392" height="14" fill="url(#strategist)"/>
    <!-- icon: chess king -->
    <g transform="translate(20,18)">
      <circle cx="28" cy="28" r="26" fill="#ffffff" opacity="0.18"/>
      <g transform="translate(12,12)" fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 10 26 L 22 26 L 23 18 L 16 14 L 9 18 z"/>
        <line x1="16" y1="10" x2="16" y2="6"/>
        <line x1="13" y1="8" x2="19" y2="8"/>
      </g>
    </g>
    <text x="88" y="40" fill="#fde68a" font-size="11" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">PERSONA 3</text>
    <text x="88" y="64" fill="#ffffff" font-size="22" font-weight="800">The Strategist</text>
    <text x="20" y="124" fill="#1e293b" font-size="13" font-style="italic">"Where should my lab / fund</text>
    <text x="20" y="142" fill="#1e293b" font-size="13" font-style="italic">put its next 12 months?"</text>

    <text x="20" y="176" fill="#92400e" font-size="11" letter-spacing="1.4" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SIGNALS THEY WANT</text>
    <g transform="translate(20,184)" font-size="12">
      <g><circle cx="6" cy="14" r="5" fill="#b45309"/><text x="20" y="18" fill="#1e293b">Cross-cut: high V × high IC</text></g>
      <g transform="translate(0,22)"><circle cx="6" cy="14" r="5" fill="#b45309"/><text x="20" y="18" fill="#1e293b">Cross-cut: low Sat × high U</text></g>
      <g transform="translate(0,44)"><circle cx="6" cy="14" r="5" fill="#b45309"/><text x="20" y="18" fill="#1e293b">Movers dashboards / radar</text></g>
      <g transform="translate(0,66)"><circle cx="6" cy="14" r="5" fill="#b45309"/><text x="20" y="18" fill="#1e293b">Trend lines on dimensions</text></g>
      <g transform="translate(0,88)"><circle cx="6" cy="14" r="5" fill="#b45309"/><text x="20" y="18" fill="#1e293b">Institution-level rollups</text></g>
    </g>

    <text x="20" y="320" fill="#92400e" font-size="11" letter-spacing="1.4" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SURFACES THEY USE</text>
    <g transform="translate(20,332)" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
      <g><rect width="100" height="22" rx="11" fill="#fde68a"/><text x="50" y="15" text-anchor="middle" fill="#92400e" font-weight="700">/trending</text></g>
      <g transform="translate(108,0)"><rect width="124" height="22" rx="11" fill="#fde68a"/><text x="62" y="15" text-anchor="middle" fill="#92400e" font-weight="700">/institutions</text></g>
      <g transform="translate(240,0)"><rect width="120" height="22" rx="11" fill="#fde68a"/><text x="60" y="15" text-anchor="middle" fill="#92400e" font-weight="700">/domains/[slug]</text></g>
    </g>
    <text x="20" y="380" fill="#94a3b8" font-size="11">Outcome: a defensible thesis + 3 portfolio bets</text>
  </g>
</svg>
