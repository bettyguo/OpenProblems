<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" role="img" aria-label="LLM OpenProblems — the rating agency for AI research problems" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>LLM OpenProblems — the rating agency for AI research problems</title>
  <desc>Brand hero showing the project pitch on the left and five rating-dimension cards on the right (Difficulty, Saturation, Urgency, Value, Industry Call). KPI strip across the bottom: 45 phases, 24 ADRs, 921/71 tests, 103 kB First Load JS, 85+ unchanged-bundle units, 9 migrations, 168 i18n keys.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1437"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2a55"/>
      <stop offset="1" stop-color="#16224a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b4d8a" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="480" fill="url(#bg)"/>
  <rect width="1280" height="480" fill="url(#grid)"/>
  <ellipse cx="1050" cy="240" rx="380" ry="320" fill="url(#glow)"/>
  <ellipse cx="220" cy="120" rx="260" ry="180" fill="url(#glow)" opacity="0.6"/>

  <!-- top eyebrow + brand mark (compact single line) -->
  <g transform="translate(72,56)">
    <rect x="0" y="-4" width="6" height="32" rx="3" fill="url(#amber)"/>
    <text x="20" y="18" fill="#e5e7eb" font-size="12" font-weight="600" letter-spacing="2.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OPENPROBLEMS · v1.0 · 2026 · A LIVING ENCYCLOPEDIA</text>
  </g>

  <!-- big title block (left) -->
  <g transform="translate(72,144)">
    <text x="0" y="0" fill="#f8fafc" font-size="58" font-weight="800" letter-spacing="-1.2">LLM <tspan fill="url(#amber)">Open</tspan>Problems</text>
    <text x="0" y="40" fill="#cbd5e1" font-size="20" font-weight="500" letter-spacing="-0.2">The rating agency for open problems in AI research.</text>
    <text x="0" y="82" fill="#94a3b8" font-size="15">Difficulty · Saturation · Urgency · Value · Industry Call —</text>
    <text x="0" y="104" fill="#94a3b8" font-size="15">five dimensions, every problem, every subdomain, time-stamped &amp; revisable.</text>

    <!-- CTA chips -->
    <g transform="translate(0,140)">
      <g>
        <rect x="0" y="0" width="184" height="44" rx="22" fill="#f59e0b"/>
        <text x="92" y="28" text-anchor="middle" fill="#0b1437" font-size="14" font-weight="700">Read the Constitution →</text>
      </g>
      <g transform="translate(196,0)">
        <rect x="0" y="0" width="180" height="44" rx="22" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
        <text x="90" y="28" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="600">View the Phase Ledger</text>
      </g>
      <g transform="translate(388,0)">
        <rect x="0" y="0" width="120" height="44" rx="22" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
        <text x="60" y="28" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="600">See an ADR</text>
      </g>
    </g>
  </g>

  <!-- 5 rating dimension cards (right) -->
  <!-- card width 96, gap 12, total 5*96+4*12 = 528. Container at x=696, viewBox right=1280, margin=56. -->
  <g transform="translate(696,72)">
    <!-- D card -->
    <g transform="translate(0,0)">
      <rect width="96" height="336" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="26" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIFFICULTY</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">S</text>
      <g transform="translate(20,108)" font-size="12" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
        <text y="0" fill="#f59e0b">S</text>
        <text y="22" fill="#fbbf24">A</text>
        <text y="44" fill="#a3a3a3">B</text>
        <text y="66" fill="#71717a">C</text>
        <text y="88" fill="#52525b">D</text>
        <text y="110" fill="#3f3f46">E</text>
      </g>
      <line x1="16" y1="262" x2="80" y2="262" stroke="#3b4d8a" stroke-opacity="0.5"/>
      <text x="48" y="280" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">LETTER GRADE</text>
      <text x="48" y="302" text-anchor="middle" fill="#cbd5e1" font-size="10">vs. current</text>
      <text x="48" y="318" text-anchor="middle" fill="#cbd5e1" font-size="10">methods</text>
    </g>

    <!-- S card (saturation) -->
    <g transform="translate(108,0)">
      <rect width="96" height="336" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="26" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SATURATION</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="38" font-weight="800">38<tspan font-size="20">%</tspan></text>
      <!-- ring -->
      <g transform="translate(48,184)">
        <circle r="40" fill="none" stroke="#1e2a55" stroke-width="10"/>
        <circle r="40" fill="none" stroke="#10b981" stroke-width="10" stroke-dasharray="95 252" stroke-linecap="round" transform="rotate(-90)"/>
        <text y="6" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">38%</text>
      </g>
      <line x1="16" y1="262" x2="80" y2="262" stroke="#3b4d8a" stroke-opacity="0.5"/>
      <text x="48" y="280" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">PROGRESS BAR</text>
      <text x="48" y="302" text-anchor="middle" fill="#cbd5e1" font-size="10">SOTA vs.</text>
      <text x="48" y="318" text-anchor="middle" fill="#cbd5e1" font-size="10">ceiling</text>
    </g>

    <!-- U card (urgency) -->
    <g transform="translate(216,0)">
      <rect width="96" height="336" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="26" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">URGENCY</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">4</text>
      <g transform="translate(8,128)">
        <g fill="#fbbf24"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(16,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(32,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(48,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#3f3f46" transform="translate(64,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
      </g>
      <text x="48" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">/ 5</text>
      <text x="48" y="208" text-anchor="middle" fill="#cbd5e1" font-size="10">downstream</text>
      <text x="48" y="222" text-anchor="middle" fill="#cbd5e1" font-size="10">blockers,</text>
      <text x="48" y="236" text-anchor="middle" fill="#cbd5e1" font-size="10">safety</text>
      <line x1="16" y1="262" x2="80" y2="262" stroke="#3b4d8a" stroke-opacity="0.5"/>
      <text x="48" y="280" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STAR RATING</text>
      <text x="48" y="302" text-anchor="middle" fill="#cbd5e1" font-size="10">time</text>
      <text x="48" y="318" text-anchor="middle" fill="#cbd5e1" font-size="10">sensitivity</text>
    </g>

    <!-- V card (value) -->
    <g transform="translate(324,0)">
      <rect width="96" height="336" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="26" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">VALUE</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">5</text>
      <g transform="translate(8,128)">
        <g fill="#fbbf24"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(16,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(32,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(48,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(64,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
      </g>
      <text x="48" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">/ 5</text>
      <text x="48" y="208" text-anchor="middle" fill="#cbd5e1" font-size="10">scientific +</text>
      <text x="48" y="222" text-anchor="middle" fill="#cbd5e1" font-size="10">economic</text>
      <text x="48" y="236" text-anchor="middle" fill="#cbd5e1" font-size="10">impact</text>
      <line x1="16" y1="262" x2="80" y2="262" stroke="#3b4d8a" stroke-opacity="0.5"/>
      <text x="48" y="280" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STAR RATING</text>
      <text x="48" y="302" text-anchor="middle" fill="#cbd5e1" font-size="10">if</text>
      <text x="48" y="318" text-anchor="middle" fill="#cbd5e1" font-size="10">advanced</text>
    </g>

    <!-- IC card (industry call) -->
    <g transform="translate(432,0)">
      <rect width="96" height="336" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="22" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.6" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">INDUSTRY CALL</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">3</text>
      <g transform="translate(8,128)">
        <g fill="#fbbf24"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(16,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(32,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#3f3f46" transform="translate(48,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#3f3f46" transform="translate(64,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
      </g>
      <text x="48" y="172" text-anchor="middle" fill="#94a3b8" font-size="10">/ 5</text>
      <text x="48" y="208" text-anchor="middle" fill="#cbd5e1" font-size="10">job postings,</text>
      <text x="48" y="222" text-anchor="middle" fill="#cbd5e1" font-size="10">VC funding,</text>
      <text x="48" y="236" text-anchor="middle" fill="#cbd5e1" font-size="10">infra demand</text>
      <line x1="16" y1="262" x2="80" y2="262" stroke="#3b4d8a" stroke-opacity="0.5"/>
      <text x="48" y="280" text-anchor="middle" fill="#94a3b8" font-size="9" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STAR RATING</text>
      <text x="48" y="302" text-anchor="middle" fill="#cbd5e1" font-size="10">demand</text>
      <text x="48" y="318" text-anchor="middle" fill="#cbd5e1" font-size="10">signal</text>
    </g>
  </g>

  <!-- bottom metric strip -->
  <g transform="translate(72,440)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <text x="0" y="0" fill="#94a3b8" font-size="11" letter-spacing="1">
      <tspan fill="#fbbf24" font-weight="700">45 PHASES</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">24 ADRs</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">921 / 71 TESTS</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">103 KB FIRST LOAD</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">85+ UNCHANGED-BUNDLE UNITS</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">9 MIGRATIONS</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">168 i18n KEYS</tspan>
    </text>
  </g>
</svg>
