<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" role="img" aria-label="LLM OpenProblems — the rating agency for AI research problems" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>LLM OpenProblems — the rating agency for AI research problems</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1437"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2a55"/>
      <stop offset="1" stop-color="#16224a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#3b4d8a" stroke-opacity="0.18" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1280" height="460" fill="url(#bg)"/>
  <rect width="1280" height="460" fill="url(#grid)"/>
  <ellipse cx="1050" cy="230" rx="380" ry="320" fill="url(#glow)"/>
  <ellipse cx="220" cy="120" rx="260" ry="180" fill="url(#glow)" opacity="0.6"/>

  <!-- top eyebrow + brand mark -->
  <g transform="translate(72,60)">
    <rect x="0" y="0" width="14" height="44" rx="3" fill="url(#amber)"/>
    <text x="28" y="20" fill="#e5e7eb" font-size="13" font-weight="600" letter-spacing="2.2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">OPENPROBLEMS · v1.0 · 2026</text>
    <text x="28" y="40" fill="#94a3b8" font-size="11" letter-spacing="1.3" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">A LIVING ENCYCLOPEDIA · METHODOLOGY-BACKED · TIME-STAMPED</text>
  </g>

  <!-- big title block (left) -->
  <g transform="translate(72,138)">
    <text x="0" y="0" fill="#f8fafc" font-size="62" font-weight="800" letter-spacing="-1.2">LLM <tspan fill="url(#amber)">Open</tspan>Problems</text>
    <text x="0" y="58" fill="#cbd5e1" font-size="22" font-weight="500" letter-spacing="-0.3">The rating agency for open problems in AI research.</text>
    <text x="0" y="98" fill="#94a3b8" font-size="16">Difficulty · Saturation · Urgency · Value · Industry Call —</text>
    <text x="0" y="120" fill="#94a3b8" font-size="16">five dimensions, every problem, every subdomain, time-stamped &amp; revisable.</text>

    <!-- CTA chips -->
    <g transform="translate(0,156)">
      <g>
        <rect x="0" y="0" width="172" height="42" rx="21" fill="#f59e0b"/>
        <text x="86" y="27" text-anchor="middle" fill="#0b1437" font-size="14" font-weight="700">Read the Constitution →</text>
      </g>
      <g transform="translate(188,0)">
        <rect x="0" y="0" width="172" height="42" rx="21" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
        <text x="86" y="27" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="600">View the Phase Ledger</text>
      </g>
      <g transform="translate(376,0)">
        <rect x="0" y="0" width="160" height="42" rx="21" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
        <text x="80" y="27" text-anchor="middle" fill="#e5e7eb" font-size="14" font-weight="600">See an ADR</text>
      </g>
    </g>
  </g>

  <!-- 5 rating dimension cards (right) -->
  <g transform="translate(700,72)">
    <!-- card width 96, gap 12, total 5*96+4*12 = 528 -->
    <!-- D card -->
    <g transform="translate(0,0)">
      <rect width="96" height="328" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIFFICULTY</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">S</text>
      <g transform="translate(16,108)" font-size="12" font-weight="700" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
        <text y="0" fill="#f59e0b">S</text>
        <text y="22" fill="#fbbf24">A</text>
        <text y="44" fill="#a3a3a3">B</text>
        <text y="66" fill="#71717a">C</text>
        <text y="88" fill="#52525b">D</text>
        <text y="110" fill="#3f3f46">E</text>
      </g>
      <text x="48" y="266" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">LETTER GRADE</text>
      <text x="48" y="290" text-anchor="middle" fill="#cbd5e1" font-size="10">vs. current</text>
      <text x="48" y="306" text-anchor="middle" fill="#cbd5e1" font-size="10">methods</text>
    </g>

    <!-- S card (saturation) -->
    <g transform="translate(108,0)">
      <rect width="96" height="328" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SATURATION</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="40" font-weight="800">38<tspan font-size="22">%</tspan></text>
      <!-- ring -->
      <g transform="translate(48,176)">
        <circle r="44" fill="none" stroke="#1e2a55" stroke-width="10"/>
        <circle r="44" fill="none" stroke="#10b981" stroke-width="10" stroke-dasharray="105 277" stroke-linecap="round" transform="rotate(-90)"/>
        <text y="6" text-anchor="middle" fill="#f8fafc" font-size="14" font-weight="700">38%</text>
      </g>
      <text x="48" y="266" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">PROGRESS BAR</text>
      <text x="48" y="290" text-anchor="middle" fill="#cbd5e1" font-size="10">SOTA vs.</text>
      <text x="48" y="306" text-anchor="middle" fill="#cbd5e1" font-size="10">ceiling</text>
    </g>

    <!-- U card (urgency) -->
    <g transform="translate(216,0)">
      <rect width="96" height="328" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">URGENCY</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">4</text>
      <g transform="translate(8,128)">
        <!-- 5 stars, 4 filled -->
        <g fill="#fbbf24"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(16,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(32,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(48,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#3f3f46" transform="translate(64,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
      </g>
      <text x="48" y="178" text-anchor="middle" fill="#94a3b8" font-size="10">/ 5</text>
      <text x="48" y="220" text-anchor="middle" fill="#cbd5e1" font-size="10">downstream</text>
      <text x="48" y="234" text-anchor="middle" fill="#cbd5e1" font-size="10">blockers,</text>
      <text x="48" y="248" text-anchor="middle" fill="#cbd5e1" font-size="10">safety</text>
      <text x="48" y="266" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STAR RATING</text>
      <text x="48" y="290" text-anchor="middle" fill="#cbd5e1" font-size="10">time</text>
      <text x="48" y="306" text-anchor="middle" fill="#cbd5e1" font-size="10">sensitivity</text>
    </g>

    <!-- V card (value) -->
    <g transform="translate(324,0)">
      <rect width="96" height="328" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">VALUE</text>
      <text x="48" y="78" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">5</text>
      <g transform="translate(8,128)">
        <g fill="#fbbf24"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(16,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(32,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(48,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(64,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
      </g>
      <text x="48" y="178" text-anchor="middle" fill="#94a3b8" font-size="10">/ 5</text>
      <text x="48" y="220" text-anchor="middle" fill="#cbd5e1" font-size="10">scientific +</text>
      <text x="48" y="234" text-anchor="middle" fill="#cbd5e1" font-size="10">economic</text>
      <text x="48" y="248" text-anchor="middle" fill="#cbd5e1" font-size="10">impact</text>
      <text x="48" y="266" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STAR RATING</text>
      <text x="48" y="290" text-anchor="middle" fill="#cbd5e1" font-size="10">if</text>
      <text x="48" y="306" text-anchor="middle" fill="#cbd5e1" font-size="10">advanced</text>
    </g>

    <!-- IC card (industry call) -->
    <g transform="translate(432,0)">
      <rect width="96" height="328" rx="12" fill="url(#card)" stroke="#3b4d8a" stroke-opacity="0.6"/>
      <text x="48" y="28" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">INDUSTRY</text>
      <text x="48" y="44" text-anchor="middle" fill="#94a3b8" font-size="10" letter-spacing="1.5" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">CALL</text>
      <text x="48" y="92" text-anchor="middle" fill="#f8fafc" font-size="44" font-weight="800">3</text>
      <g transform="translate(8,138)">
        <g fill="#fbbf24"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(16,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#fbbf24" transform="translate(32,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#3f3f46" transform="translate(48,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
        <g fill="#3f3f46" transform="translate(64,0)"><path d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/></g>
      </g>
      <text x="48" y="190" text-anchor="middle" fill="#94a3b8" font-size="10">/ 5</text>
      <text x="48" y="220" text-anchor="middle" fill="#cbd5e1" font-size="10">job</text>
      <text x="48" y="234" text-anchor="middle" fill="#cbd5e1" font-size="10">postings,</text>
      <text x="48" y="248" text-anchor="middle" fill="#cbd5e1" font-size="10">VC, infra</text>
      <text x="48" y="266" text-anchor="middle" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">STAR RATING</text>
      <text x="48" y="290" text-anchor="middle" fill="#cbd5e1" font-size="10">demand</text>
      <text x="48" y="306" text-anchor="middle" fill="#cbd5e1" font-size="10">signal</text>
    </g>
  </g>

  <!-- bottom metric strip -->
  <g transform="translate(72,408)" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">
    <text x="0" y="0" fill="#94a3b8" font-size="11" letter-spacing="1">
      <tspan fill="#fbbf24" font-weight="700">45 PHASES</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">24 ADRs</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">921 / 71 TESTS</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">103 KB FIRST LOAD</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">85+ UNCHANGED-BUNDLE UNITS</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">9 MIGRATIONS</tspan>  ·  <tspan fill="#fbbf24" font-weight="700">168 i18n KEYS</tspan>
    </text>
  </g>
</svg>
