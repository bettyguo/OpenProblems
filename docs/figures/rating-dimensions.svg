<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 560" role="img" aria-label="Five rating dimensions — Difficulty, Saturation, Urgency, Value, Industry Call — scales and meanings" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Inter,sans-serif">
  <title>Five rating dimensions — methodology v1.0</title>
  <defs>
    <linearGradient id="bg-rd" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#eef2f7"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="560" fill="url(#bg-rd)"/>

  <g transform="translate(40,36)">
    <text x="0" y="0" fill="#0f172a" font-size="26" font-weight="800" letter-spacing="-0.3">Five rating dimensions · methodology v1.0</text>
    <text x="0" y="22" fill="#475569" font-size="13">Each scored independently · each with a rationale · each with a revisable history · all revisions emit immutable rating-actions</text>
    <text x="1240" y="-2" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">FIG · 4 / 7</text>
    <text x="1240" y="18" text-anchor="end" fill="#94a3b8" font-size="11" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" letter-spacing="1.4">MASTER_PROMPT.md · §3.1 + §8</text>
  </g>

  <!-- 5 columns, each 224 wide, gap 16. Origin at (40,108). Total = 5*224 + 4*16 = 1184. -->

  <!-- Column 1: Difficulty -->
  <g transform="translate(40,108)">
    <rect width="224" height="416" rx="14" fill="#ffffff" stroke="#1d4ed8" stroke-width="2"/>
    <rect x="0" y="0" width="224" height="56" rx="14" fill="#1d4ed8"/>
    <rect x="0" y="42" width="224" height="14" fill="#1d4ed8"/>
    <text x="112" y="22" text-anchor="middle" fill="#dbeafe" font-size="10" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIMENSION 1</text>
    <text x="112" y="44" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">Difficulty</text>
    <text x="112" y="84" text-anchor="middle" fill="#1e293b" font-size="12">How hard is this,</text>
    <text x="112" y="100" text-anchor="middle" fill="#1e293b" font-size="12">given current methods?</text>

    <text x="20" y="138" fill="#64748b" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SCALE · LETTER GRADE</text>
    <g transform="translate(20,150)">
      <g><rect width="184" height="30" rx="6" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/><text x="14" y="20" fill="#1e3a8a" font-size="13" font-weight="800">S</text><text x="44" y="20" fill="#1e293b" font-size="11">grand-challenge</text></g>
      <g transform="translate(0,36)"><rect width="184" height="30" rx="6" fill="#dbeafe"/><text x="14" y="20" fill="#1d4ed8" font-size="13" font-weight="800">A</text><text x="44" y="20" fill="#1e293b" font-size="11">very hard</text></g>
      <g transform="translate(0,72)"><rect width="184" height="30" rx="6" fill="#e2e8f0"/><text x="14" y="20" fill="#475569" font-size="13" font-weight="800">B</text><text x="44" y="20" fill="#1e293b" font-size="11">hard</text></g>
      <g transform="translate(0,108)"><rect width="184" height="30" rx="6" fill="#e2e8f0"/><text x="14" y="20" fill="#475569" font-size="13" font-weight="800">C</text><text x="44" y="20" fill="#1e293b" font-size="11">moderate</text></g>
      <g transform="translate(0,144)"><rect width="184" height="30" rx="6" fill="#f1f5f9"/><text x="14" y="20" fill="#64748b" font-size="13" font-weight="800">D</text><text x="44" y="20" fill="#1e293b" font-size="11">low</text></g>
      <g transform="translate(0,180)"><rect width="184" height="30" rx="6" fill="#f1f5f9"/><text x="14" y="20" fill="#94a3b8" font-size="13" font-weight="800">E</text><text x="44" y="20" fill="#1e293b" font-size="11">trivial</text></g>
    </g>
    <text x="20" y="392" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">type: union of 6 literals</text>
  </g>

  <!-- Column 2: Saturation -->
  <g transform="translate(280,108)">
    <rect width="224" height="416" rx="14" fill="#ffffff" stroke="#047857" stroke-width="2"/>
    <rect x="0" y="0" width="224" height="56" rx="14" fill="#047857"/>
    <rect x="0" y="42" width="224" height="14" fill="#047857"/>
    <text x="112" y="22" text-anchor="middle" fill="#a7f3d0" font-size="10" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIMENSION 2</text>
    <text x="112" y="44" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">Saturation</text>
    <text x="112" y="84" text-anchor="middle" fill="#1e293b" font-size="12">How close to "solved"</text>
    <text x="112" y="100" text-anchor="middle" fill="#1e293b" font-size="12">vs. achievable ceiling?</text>

    <text x="20" y="138" fill="#64748b" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SCALE · 0 — 100 PERCENT</text>

    <!-- big donut -->
    <g transform="translate(112,236)">
      <circle r="62" fill="none" stroke="#e2e8f0" stroke-width="12"/>
      <circle r="62" fill="none" stroke="#10b981" stroke-width="12" stroke-dasharray="148 389" stroke-linecap="round" transform="rotate(-90)"/>
      <text y="-4" text-anchor="middle" fill="#0f172a" font-size="32" font-weight="800">38</text>
      <text y="22" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700">PERCENT</text>
    </g>

    <g transform="translate(20,328)" font-size="11">
      <text y="0" fill="#475569"><tspan fill="#0f172a" font-weight="700">0%</tspan> · pristine open problem</text>
      <text y="18" fill="#475569"><tspan fill="#0f172a" font-weight="700">50%</tspan> · halfway to ceiling</text>
      <text y="36" fill="#475569"><tspan fill="#0f172a" font-weight="700">100%</tspan> · effectively solved</text>
    </g>
    <text x="20" y="392" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">type: number(0..100) · null OK</text>
  </g>

  <!-- Column 3: Urgency -->
  <g transform="translate(520,108)">
    <rect width="224" height="416" rx="14" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <rect x="0" y="0" width="224" height="56" rx="14" fill="#d97706"/>
    <rect x="0" y="42" width="224" height="14" fill="#d97706"/>
    <text x="112" y="22" text-anchor="middle" fill="#fde68a" font-size="10" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIMENSION 3</text>
