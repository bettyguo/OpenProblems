        <g fill="#f59e0b">
          <path transform="translate(0,0)"   d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
          <path transform="translate(28,0)"  d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
        </g>
        <g fill="#e2e8f0">
          <path transform="translate(56,0)"  d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
          <path transform="translate(84,0)"  d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
          <path transform="translate(112,0)" d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
        </g>
      </g>
      <g transform="translate(0,112)"><text x="-12" y="14" fill="#64748b" font-size="11" text-anchor="end" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">1</text>
        <g fill="#f59e0b">
          <path transform="translate(0,0)" d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
        </g>
        <g fill="#e2e8f0">
