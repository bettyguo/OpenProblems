  <!-- Column 5: Industry Call -->
  <g transform="translate(1000,108)">
    <rect width="224" height="416" rx="14" fill="#ffffff" stroke="#dc2626" stroke-width="2"/>
    <rect x="0" y="0" width="224" height="56" rx="14" fill="#dc2626"/>
