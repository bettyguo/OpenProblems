        <g fill="#f59e0b">
          <path transform="translate(0,0)"   d="M8 0 l2.4 5.1 5.6 0.6 -4.2 3.9 1.2 5.6 -5 -2.9 -5 2.9 1.2 -5.6 -4.2 -3.9 5.6 -0.6 z"/>
