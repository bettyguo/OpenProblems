    <text x="20" y="360" fill="#475569" font-size="11">5 · existential / safety-critical</text>
    <text x="20" y="376" fill="#475569" font-size="11">3 · clear blocker, no deadline</text>
    <text x="20" y="392" fill="#94a3b8" font-size="10" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">type: integer(0..5)</text>
  </g>

  <!-- Column 4: Value -->
  <g transform="translate(760,108)">
    <rect width="224" height="416" rx="14" fill="#ffffff" stroke="#7c3aed" stroke-width="2"/>
    <rect x="0" y="0" width="224" height="56" rx="14" fill="#7c3aed"/>
    <rect x="0" y="42" width="224" height="14" fill="#7c3aed"/>
    <text x="112" y="22" text-anchor="middle" fill="#ddd6fe" font-size="10" letter-spacing="2" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">DIMENSION 4</text>
    <text x="112" y="44" text-anchor="middle" fill="#ffffff" font-size="20" font-weight="800">Value</text>
    <text x="112" y="84" text-anchor="middle" fill="#1e293b" font-size="12">Expected scientific /</text>
    <text x="112" y="100" text-anchor="middle" fill="#1e293b" font-size="12">economic impact</text>

    <text x="20" y="138" fill="#64748b" font-size="10" letter-spacing="1.4" font-family="ui-monospace,SFMono-Regular,Menlo,monospace">SCALE · 0 — 5 STARS</text>

