title: "HyenaDNA: Long-Range Genomic Sequence Modeling at Single Nucleotide Resolution"
authors: []
institutions:
  - stanford-university
  - uc-berkeley
venue: arXiv 2023
year: 2023
arxiv_id: "2306.15794"
tldr: |
  Replaces Transformer attention with the Hyena long-convolution operator and trains on raw
  nucleotide sequences at single-base resolution, reaching contexts up to ~1M tokens — orders of
  magnitude beyond prior genomic foundation models. Shows that single-nucleotide-resolution
  context unlocks tasks where k-mer tokenisation lost signal, broadening the design space.
