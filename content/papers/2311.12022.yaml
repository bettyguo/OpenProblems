tldr: |
  Releases GPQA, a multiple-choice benchmark of biology, physics, and chemistry questions written by
  PhD-domain experts and validated to resist non-expert solving even with web access. The Diamond
  split (highest-quality questions) became the canonical capability-gulf evaluation surface for
  scalable-oversight protocols.
