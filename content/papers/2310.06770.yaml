tldr: |
  Releases SWE-bench, a benchmark of real GitHub issues from popular Python repositories with associated
  test suites as verifiers. Resolved-rate on the Verified subset became the canonical agent-coding metric;
  pass@1 climbed from single digits in 2023 to a high plateau by early 2026.
