tldr: |
  Synthesises the first wave of LLM-based autonomous agent systems across construction, applications,
  and evaluation. The construction taxonomy (profile, memory, planning, action) and the evaluation
  taxonomy informed every later survey of the field and named the failure modes (coordination
  overhead, brittle memory) that the 2024–26 multi-agent surveys then quantified.
