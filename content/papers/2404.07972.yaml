tldr: |
  Releases OSWorld, a computer-use agent benchmark spanning real operating-system environments (Ubuntu,
  Windows) and a wide range of applications. Success rates remained substantially below the same models'
  web-only computer-use scores, surfacing the real-OS gap as a frontier challenge.
