tldr: |
  Proposes a multi-agent software-engineering framework where agents play role-typed positions
  (product manager, architect, engineer, QA) and communicate via standardised operating procedures.
  One of the canonical 2023 multi-agent-framework demos that motivated the 2024–26 survey wave
  documenting the team-size scaling wall.
