tldr: |
  Introduces RAG, a model architecture that combines a parametric seq2seq generator with a
  non-parametric dense retriever over Wikipedia, trained end-to-end. Established the retrieval-
  augmented generation pattern that became the dominant production composition by 2023–2024 — and
  whose long-context limits this problem entry tracks.
