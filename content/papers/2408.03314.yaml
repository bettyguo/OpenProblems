title: "Scaling LLM Test-Time Compute Optimally can be More Effective than Scaling Model Parameters"
authors:
  - charlie-snell
  - aviral-kumar
institutions:
  - uc-berkeley
  - google-deepmind
venue: arXiv 2024
year: 2024
arxiv_id: "2408.03314"
tldr: |
  Studies the compute-optimal allocation between inference-time strategies (best-of-N with a verifier,
  iterative refinement, longer single chain) at a fixed total budget. Finds that the optimal allocation
  depends on the task-difficulty regime: easier prompts reward parallel sampling, harder prompts reward
  longer single chains.
