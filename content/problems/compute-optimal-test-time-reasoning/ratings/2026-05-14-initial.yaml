problem_slug: compute-optimal-test-time-reasoning
date: 2026-05-14
methodology_version: "1.0.0"
curator: jikun
dimensions:
  difficulty:
    grade: B
    confidence: 0.65
    rationale: |
      Difficulty B because the problem decomposes — a useful per-prompt
      allocator can be learned from existing decoding-strategy data, and
      partial wins on bounded budgets are routine. Not A because the inverse
      scaling regime makes the loss surface non-monotone in compute, and the
      meta-question (how to allocate cheaply at deployment time) is harder
      than the inner question.
  saturation:
    value: 35
    confidence: 0.55
    rationale: |
      Coarse policies (best-of-N at fixed N, fixed reasoning length) work
      well on monotone regimes. Per-prompt adaptive allocators with
      negligible overhead exist on narrow surfaces. Saturation against
      a hypothetical "matches the per-prompt oracle within 5% accuracy at
      fixed budget" ceiling. TODO(curate) on AIME-2026 / GPQA / HLE numbers.
  urgency:
    stars: 4
    confidence: 0.7
    rationale: |
      Inference cost is now the dominant operating cost for frontier-model
      deployments, and the gap between coarse and per-prompt allocators is
      large enough to be a first-order economic concern. Below 5 because
      a coarse global policy is workable, just expensive.
  value:
    stars: 4
    confidence: 0.7
    rationale: |
      A working per-prompt compute-optimal allocator would unlock tens of
      percent of inference savings at fixed accuracy or non-trivial
      accuracy gains at fixed budget. Spillover into
      [[long-horizon-agent-reliability]] (where compute allocation across
      a trajectory is the same problem one level up) is direct.
  industry_call:
    stars: 5
    confidence: 0.7
    rationale: |
      Inference cost dominates frontier-lab P&L, every product-team budget
      cycle of 2025–26 has been about per-prompt cost control, and the
      hiring profile for "inference systems" has surged. 5 stars on
      industry call.
signals_considered:
  - 2022–23 self-consistency / verifier-guided decoding literature
  - Snell et al. 2024 compute-optimal-scaling result legitimising test-time compute
  - Wave of 2024–25 methods (best-of-N + verifiers, tree-of-thought, internalised CoT)
  - Yang et al. 2025 inverse-scaling-in-test-time finding on knowledge-intensive QA
  - 2025–26 frontier-lab inference-cost reporting
watchlist: false
