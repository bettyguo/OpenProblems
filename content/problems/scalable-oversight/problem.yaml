slug: scalable-oversight
title: Scalable Oversight Beyond Human-Verifiable Capability
subtitle: How to evaluate, train, and correct models on tasks where the human supervisor is no longer the most-capable judge.
domain: social-aspects
subdomain: alignment
tags:
  - oversight
  - alignment
