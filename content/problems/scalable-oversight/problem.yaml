benchmarks:
  - id: gpqa-diamond
    name: GPQA-Diamond (oversight split)
    dataset: GPQA Diamond
    metric: judge-accuracy-vs-expert
    metric_direction: higher-is-better
    notes: |
      The Diamond split of GPQA asks PhD-domain-expert questions whose answers
      are unverifiable by non-experts. Used as an oversight-protocol benchmark
      by measuring how reliably a non-expert (or weaker model) judge can pick
      the correct answer when assisted by debate, critique, or prover-verifier
      protocols.
  - id: debate-arena
    name: Debate-arena protocols
    dataset: Various
    metric: protocol-truthfulness
    metric_direction: higher-is-better
    notes: |
      Family of debate, market, and recursive-decomposition evaluation
      protocols whose common metric is "does the protocol return the truthful
      answer when run by a weaker judge?" No single dataset is canonical;
      results are typically reported per-protocol.
