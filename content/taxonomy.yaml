      - { id: clustering,                      title: "Clustering" }
      - { id: data,                            title: "Data" }
      - { id: evaluation,                      title: "Evaluation" }
      - { id: hardware-software,               title: "Hardware & Software" }
      - { id: kernel-methods,                  title: "Kernel Methods" }
      - { id: online-active-bandits,           title: "Online Learning, Active Learning & Bandits" }
      - { id: representation-learning,         title: "Representation Learning" }
